<div id="wewe-tool">
    <h3>We-We Calculator</h3>
    <p>Paste your email copy below to see whether your messaging is brand-focused or customer-focused.</p>
    <textarea id="wewe-inputText" rows="5" cols="50" placeholder="Paste your email copy here..."></textarea>
    <button id="wewe-analyze">Analyze</button>
    <div id="wewe-result"></div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        function t(t) {
            let e = 0,
                n = 0,
                o = t.toLowerCase().match(/\b(\w+)\b/g) || [];
            o.forEach(t => {
                "we us our my i me".split(" ").includes(t) ? e++ : "you your".split(" ").includes(t) && n++
            });
            let l = e + n;
            return {
                brandPercentage: l > 0 ? Math.round(e / l * 100) : 0,
                customerPercentage: l > 0 ? Math.round(n / l * 100) : 0
            }
        }
        document.getElementById("wewe-analyze").addEventListener("click", function() {
            let e = document.getElementById("wewe-inputText").value.trim();
            if (!e) return void(document.getElementById("wewe-result").innerHTML = "<p style='color:red;'>Please enter text to analyze.</p>");
            let n = t(e);
            document.getElementById("wewe-result").innerHTML = `<p><strong>Brand-Focused:</strong> ${n.brandPercentage}%</p><p><strong>Customer-Focused:</strong> ${n.customerPercentage}%</p>${n.brandPercentage>60?'<p>💡 Your messaging is heavily brand-focused. Try using more “you” statements to engage the reader.</p>':''}`
        })
    });

</script>
