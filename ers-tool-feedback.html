<div id="email-readability-tool">
    <h3>Email Readability Score</h3>
    <p>Paste your email copy below to check its readability level.</p>
    <textarea id="readability-input" rows="6" cols="50" placeholder="Paste your email copy here..."></textarea>
    <button id="readability-check-button">Check Readability</button>
    <div id="readability-result"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    function calculateFleschKincaid(text) {
        const words = text.split(/\s+/).length;
        const sentences = text.split(/[.!?]+/).length - 1;
        const syllables = text.toLowerCase().split(/[aeiouy]{1,2}/).length - 1;
        
        const score = 206.835 - (1.015 * (words / sentences)) - (84.6 * (syllables / words));
        let gradeLevel = "";
        if (score >= 90) gradeLevel = "Very Easy (5th grade)";
        else if (score >= 80) gradeLevel = "Easy (6th grade)";
        else if (score >= 70) gradeLevel = "Fairly Easy (7th grade)";
        else if (score >= 60) gradeLevel = "Standard (8th-9th grade)";
        else if (score >= 50) gradeLevel = "Fairly Difficult (10th-12th grade)";
        else if (score >= 30) gradeLevel = "Difficult (College level)";
        else gradeLevel = "Very Difficult (Advanced College Level)";
        
        return { score: score.toFixed(2), gradeLevel };
    }
    
    function calculateGunningFog(text) {
        const words = text.split(/\s+/).length;
        const sentences = text.split(/[.!?]+/).length - 1;
        const complexWords = text.split(/\b/).filter(word => word.length > 6).length;
        
        const score = 0.4 * ((words / sentences) + 100 * (complexWords / words));
        return score.toFixed(2);
    }
    
    function calculateSMOG(text) {
        const sentences = text.split(/[.!?]+/).length - 1;
        const complexWords = text.split(/\b/).filter(word => word.length > 6).length;
        
        const score = 1.0430 * Math.sqrt(complexWords * (30 / sentences)) + 3.1291;
        return score.toFixed(2);
    }
    
    function calculateBlendedScore(fkScore, gfScore, smogScore) {
        return ((parseFloat(fkScore) + parseFloat(gfScore) + parseFloat(smogScore)) / 3).toFixed(2);
    }

    function analyzeText(text) {
        let feedback = [];
        
        // Detect long sentences
        const sentences = text.split(/[.!?]+/);
        const longSentences = sentences.filter(sentence => sentence.split(/\s+/).length > 20);
        if (longSentences.length > 0) {
            feedback.push("Consider breaking up long sentences for better readability.");
        }
        
        // Detect complex words
        const complexWords = text.split(/\b/).filter(word => word.length > 12);
        if (complexWords.length > 5) {
            feedback.push("Your text contains many complex words. Try simplifying for better engagement.");
        }
        
        // Detect passive voice (basic method)
        const passivePatterns = /\b(is|was|were|been|being|are|be)\s\b\w+ed\b/gi;
        const passiveMatches = text.match(passivePatterns);
        if (passiveMatches && passiveMatches.length > 3) {
            feedback.push("Your text uses passive voice frequently. Consider rewording to active voice for clarity.");
        }
        
        return feedback;
    }
    
    document.getElementById("readability-check-button").addEventListener("click", function() {
        const inputText = document.getElementById("readability-input").value.trim();
        if (!inputText) {
            document.getElementById("readability-result").innerHTML = "<p style='color:red;'>Please enter text to analyze.</p>";
            return;
        }
        
        const fkResult = calculateFleschKincaid(inputText);
        const gfScore = calculateGunningFog(inputText);
        const smogScore = calculateSMOG(inputText);
        const blendedScore = calculateBlendedScore(fkResult.score, gfScore, smogScore);
        const feedback = analyzeText(inputText);
        
        document.getElementById("readability-result").innerHTML = `
            <p><strong>Flesch-Kincaid Score:</strong> ${fkResult.score} (${fkResult.gradeLevel})</p>
            <p><strong>Gunning Fog Score:</strong> ${gfScore}</p>
            <p><strong>SMOG Score:</strong> ${smogScore}</p>
            <p><strong>Blended Readability Score:</strong> ${blendedScore}</p>
            ${feedback.length > 0 ? `<p><strong>Suggestions:</strong></p><ul><li>${feedback.join('</li><li>')}</li></ul>` : ''}
        `;
    });
});
</script>
